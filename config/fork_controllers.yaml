controller_manager:
  ros__parameters:
    update_rate: 100
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    fork_position_controller:
      type: position_controllers/JointGroupPositionController

fork_position_controller:
  ros__parameters:
    joints:
      - fork_carriage_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_integration_in_goal_trajectories: true
